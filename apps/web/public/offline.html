<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Offline · SuiPredict AI</title>
  <link rel="icon" href="/icon.svg" sizes="any" type="image/svg+xml" />
  <meta name="theme-color" content="#10b981" />
  <meta name="description" content="SuiPredict AI is offline. Reconnect to see live markets." />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #050508;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .card {
      max-width: 480px;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.10);
      background: #0d1018;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
    }
    .emoji { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
    p { font-size: 14px; line-height: 1.6; color: #a1a1aa; margin-bottom: 16px; }
    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 24px;
      border-radius: 12px;
      border: 0;
      background: linear-gradient(90deg, #10b981, #06b6d4);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 0 30px rgba(16, 185, 129, 0.3);
    }
    button:hover { transform: scale(1.02); }
    .hint {
      margin-top: 20px;
      font-size: 12px;
      color: #71717a;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji" aria-hidden="true">📵</div>
    <h1>You're offline</h1>
    <p>
      SuiPredict AI needs a connection to fetch live markets and
      submit orders. Reconnect and this page will refresh automatically.
    </p>
    <button type="button" onclick="location.reload()">
      ↻ Retry
    </button>
    <p class="hint">Tip: world cup markets are listed in your
      browser history — open one once online for an instant preview next time.</p>
  </div>
  <script>
    // When the browser detects connectivity, refresh automatically.
    // `online` fires on tab activation if the user toggled wifi back on.
    window.addEventListener("online", () => location.reload());
  </script>
</body>
</html>
