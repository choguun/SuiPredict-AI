[package]
name = "suipredict_agent_policy"
version = "0.1.0"
edition = "2024.beta"

[dependencies]
# Use SELF-HOSTED deepbookv3 (custom token/DEEP)
deepbook = { local = "../../deps/deepbookv3-self-hosted/packages/deepbook" }

# Override deepbook's git-based token dep with our self-hosted one
token = { local = "../../deps/deepbookv3-self-hosted/packages/token", override = true }

[addresses]
suipredict = "0x0"
suipredict_agent_policy = "0x0"

[dev-addresses]
suipredict = "0x0"
suipredict_agent_policy = "0x0"

[published.testnet]
# Live testnet deployment: the AgentPolicy shared object (0xb624f2fc78...)
# is stamped with this package id, so all upgrade tickets must reference
# it as the package's original-id. Adding this here lets the Move
# compiler emit bytecode whose `original-id` field matches the live
# UpgradeCap at 0x646dfdb6d287bb00210c060976ceb309d67456a9132cbe7d529c1f21b9b8181a.
original-id = "0xb1777f167c29dbf1d0bf6e014157b3afd377608703d4935106989a0bb2be3ebf"
