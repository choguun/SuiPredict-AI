[package]
name = "suipredict_agent_policy"
version = "0.1.0"
edition = "2024.beta"

[dependencies]
# Use the ORIGINAL deepbookv3 (Mysten Labs, no local modifications)
deepbook = { local = "../../deps/deepbookv3/packages/deepbook" }

# Override deepbook's git-based token dep with our local one
# (deepbook depends on token via git; we replace it with local)
token = { local = "../../deps/deepbookv3/packages/token", override = true }

[addresses]
suipredict = "0x0"
suipredict_agent_policy = "0x0"

[dev-addresses]
suipredict = "0x0"
suipredict_agent_policy = "0x0"
