name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm --filter @suipredict/sdk build

      - name: Build web
        run: pnpm --filter @suipredict/web build

      - name: Build agents
        run: pnpm --filter @suipredict/agents build

      - name: Move build
        run: pnpm contracts:build

      - name: Move tests
        run: pnpm contracts:test

      - name: SDK tests
        run: pnpm --filter @suipredict/sdk test --if-present

      - name: Agents tests
        run: pnpm --filter @suipredict/agents test --if-present

      - name: Web lint
        run: pnpm --filter @suipredict/web lint --if-present

      - name: Agents lint
        run: pnpm --filter @suipredict/agents lint --if-present
